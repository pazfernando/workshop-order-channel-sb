name: Teardown
run-name: ${{ format('Teardown POS ({0})', inputs.resource_prefix || 'aws-dev-sb') }}

on:
  workflow_dispatch:
    inputs:
      resource_prefix:
        description: Prefix used by the deployment to tear down
        required: false
        default: aws-dev-sb
        type: string
      confirm:
        description: Type 'yes' to confirm teardown
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  SERVICE_NAME: workshop-order-channel-pos
  ENVIRONMENT_NAME: aws-dev
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER != '' && vars.ECS_CLUSTER || 'default' }}
  OBSERVABILITY_CONTRACT_PATH: contracts/observability/pos.observability.yaml

jobs:
  teardown:
    name: Delete ECS Express Mode service
    runs-on: ubuntu-latest
    environment: aws-dev

    env:
      RESOURCE_PREFIX: ${{ inputs.resource_prefix || 'aws-dev-sb' }}
      SERVICE_NAME_WITH_PREFIX: ${{ format('{0}-{1}', inputs.resource_prefix || 'aws-dev-sb', 'workshop-order-channel-pos') }}

    steps:
      - name: Validate confirmation
        run: |
          set -euo pipefail

          if ! printf '%s' "$RESOURCE_PREFIX" | grep -Eq '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
            echo "resource_prefix must be lowercase DNS-safe text, for example aws-dev-sb." >&2
            exit 1
          fi

          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "Please set confirm input to 'yes' to proceed with teardown." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify observability contract path
        run: |
          set -euo pipefail
          test -f "$OBSERVABILITY_CONTRACT_PATH"

      - name: Delete ECS Express Mode service
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          if [ -z "$AWS_ACCOUNT_ID" ] || [ "$AWS_ACCOUNT_ID" = "None" ]; then
            echo "Unable to resolve AWS account from the configured credentials." >&2
            exit 1
          fi

          SERVICE_ARN="arn:aws:ecs:${AWS_REGION}:${AWS_ACCOUNT_ID}:service/${ECS_CLUSTER}/${SERVICE_NAME_WITH_PREFIX}"

          if ! aws ecs describe-express-gateway-service --service-arn "$SERVICE_ARN" >/tmp/ecs-express-service.json 2>/tmp/ecs-express-describe.err; then
            echo "ECS Express service was not found or is not accessible: $SERVICE_ARN"
            cat /tmp/ecs-express-describe.err
            exit 0
          fi

          aws ecs delete-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --monitor-resources RESOURCE \
            --monitor-mode TEXT-ONLY

      - name: Teardown summary
        run: |
          {
            echo "## POS ECS Express teardown"
            echo ""
            echo "- ECS service: \`${SERVICE_NAME_WITH_PREFIX}\`"
            echo "- ECS cluster: \`${ECS_CLUSTER}\`"
            echo "- Resource prefix: \`${RESOURCE_PREFIX}\`"
            echo "- Observability contract: \`${OBSERVABILITY_CONTRACT_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
